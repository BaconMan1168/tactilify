<style>
  body { font-family: -apple-system, system-ui, sans-serif; }
  .ui-panel {
    background: #0f1011;
    border: 1px solid #23252a;
    border-radius: 12px;
    padding: 20px;
    max-width: 480px;
    margin: 16px auto 0;
  }
  .ui-label {
    font-size: 11px;
    font-weight: 500;
    color: #62666d;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #141516;
    border: 1px solid #23252a;
    border-radius: 6px;
    padding: 3px;
  }
  .zoom-btn {
    width: 26px;
    height: 26px;
    background: none;
    border: none;
    border-radius: 4px;
    color: #8a8f98;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .zoom-btn:hover { background: #23252a; color: #f7f8f8; }
  .zoom-level {
    font-size: 11px;
    color: #62666d;
    min-width: 36px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .zoom-divider {
    width: 1px;
    height: 16px;
    background: #23252a;
    margin: 0 2px;
  }
  .zoom-fit-btn {
    font-size: 10px;
    font-weight: 500;
    color: #8a8f98;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 4px;
    border-radius: 3px;
  }
  .zoom-fit-btn:hover { color: #f7f8f8; background: #23252a; }

  .svg-viewport {
    background: #fff;
    border: 1px solid #34343a;
    border-radius: 8px;
    height: 320px;
    overflow: auto;
    position: relative;
  }
  .svg-inner {
    padding: 16px;
    box-sizing: border-box;
    transform-origin: top left;
    /* zoom applied inline */
  }
  .print-note {
    margin-top: 10px;
    font-size: 11px;
    color: #62666d;
    line-height: 1.5;
    padding: 8px 10px;
    background: #141516;
    border-radius: 6px;
    border: 1px solid #23252a;
  }
  .dl-btn {
    margin-top: 10px;
    width: 100%;
    padding: 8px 14px;
    background: #5e6ad2;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .dl-btn:hover { background: #828fff; }
</style>

<h2>Tactile SVG panel — with zoom controls</h2>
<p class="subtitle">Zoom in/out sits in the panel header. The SVG viewport scrolls freely at any zoom level.</p>

<div class="ui-panel">
  <div class="ui-label">Tactile / braille SVG</div>

  <div class="preview-header">
    <span style="font-size:11px;color:#8a8f98">A4 · braille-encoded labels</span>
    <div class="zoom-controls" id="zoomBar">
      <button class="zoom-btn" onclick="zoom(-1)" aria-label="Zoom out">−</button>
      <span class="zoom-level" id="zoomLabel">100%</span>
      <button class="zoom-btn" onclick="zoom(1)" aria-label="Zoom in">+</button>
      <div class="zoom-divider"></div>
      <button class="zoom-fit-btn" onclick="resetZoom()" aria-label="Reset zoom">Fit</button>
    </div>
  </div>

  <div class="svg-viewport" id="viewport">
    <div class="svg-inner" id="svgInner">
      <!-- A4 aspect SVG with sample circuit -->
      <svg viewBox="0 0 340 480" width="340" height="480" xmlns="http://www.w3.org/2000/svg" aria-label="Tactile circuit diagram">
        <!-- outer circuit loop -->
        <rect x="20" y="20" width="300" height="440" fill="none" stroke="none"/>

        <!-- top wire -->
        <line x1="60" y1="40" x2="280" y2="40" stroke="#000" stroke-width="1.5"/>
        <!-- right wire -->
        <line x1="280" y1="40" x2="280" y2="440" stroke="#000" stroke-width="1.5"/>
        <!-- bottom wire -->
        <line x1="60" y1="440" x2="280" y2="440" stroke="#000" stroke-width="1.5"/>
        <!-- left wire -->
        <line x1="60" y1="40" x2="60" y2="160" stroke="#000" stroke-width="1.5"/>
        <line x1="60" y1="220" x2="60" y2="440" stroke="#000" stroke-width="1.5"/>

        <!-- BATTERY (left side, vertical) at y=160–220 -->
        <line x1="52" y1="160" x2="68" y2="160" stroke="#000" stroke-width="2"/>
        <line x1="56" y1="170" x2="64" y2="170" stroke="#000" stroke-width="1.2"/>
        <line x1="52" y1="180" x2="68" y2="180" stroke="#000" stroke-width="2"/>
        <line x1="56" y1="190" x2="64" y2="190" stroke="#000" stroke-width="1.2"/>
        <line x1="52" y1="200" x2="68" y2="200" stroke="#000" stroke-width="2"/>
        <line x1="56" y1="210" x2="64" y2="210" stroke="#000" stroke-width="1.2"/>
        <line x1="60" y1="160" x2="60" y2="165" stroke="#000" stroke-width="1.5"/>
        <line x1="60" y1="215" x2="60" y2="220" stroke="#000" stroke-width="1.5"/>
        <!-- battery braille label -->
        <text x="74" y="193" font-size="9" fill="#000" font-family="serif">⠃⠁⠞⠞⠑⠗⠽</text>

        <!-- RESISTOR (top, horizontal) at x=110–200 -->
        <line x1="110" y1="40" x2="118" y2="40" stroke="#000" stroke-width="1.5"/>
        <polyline points="118,40 122,30 130,50 138,30 146,50 154,30 162,50 170,30 178,50 182,40" fill="none" stroke="#000" stroke-width="1.5"/>
        <line x1="182" y1="40" x2="190" y2="40" stroke="#000" stroke-width="1.5"/>
        <!-- resistor braille label -->
        <text x="128" y="22" font-size="9" fill="#000" font-family="serif">⠗⠑⠎⠊⠎⠞</text>

        <!-- BULB (right side, vertical) at y=160–220 -->
        <circle cx="280" cy="190" r="22" fill="none" stroke="#000" stroke-width="1.5"/>
        <line x1="268" y1="178" x2="292" y2="202" stroke="#000" stroke-width="1.2"/>
        <line x1="292" y1="178" x2="268" y2="202" stroke="#000" stroke-width="1.2"/>
        <!-- wire stubs to circle -->
        <line x1="280" y1="40" x2="280" y2="168" stroke="#000" stroke-width="1.5"/>
        <line x1="280" y1="212" x2="280" y2="440" stroke="#000" stroke-width="1.5"/>
        <!-- bulb braille label -->
        <text x="308" y="194" font-size="9" fill="#000" font-family="serif">⠃⠥⠇⠃</text>

        <!-- SWITCH (bottom, horizontal) at x=150–200 -->
        <line x1="130" y1="440" x2="152" y2="440" stroke="#000" stroke-width="1.5"/>
        <!-- open switch: angled gap -->
        <line x1="152" y1="440" x2="170" y2="428" stroke="#000" stroke-width="1.5"/>
        <circle cx="174" cy="440" r="2" fill="none" stroke="#000" stroke-width="1.5"/>
        <line x1="176" y1="440" x2="198" y2="440" stroke="#000" stroke-width="1.5"/>
        <!-- switch braille label -->
        <text x="144" y="458" font-size="9" fill="#000" font-family="serif">⠎⠺⠊⠞⠉⠓</text>

        <!-- CAPACITOR (bottom-right area) at x=220–260 bottom -->
        <line x1="220" y1="440" x2="236" y2="440" stroke="#000" stroke-width="1.5"/>
        <line x1="236" y1="430" x2="236" y2="450" stroke="#000" stroke-width="1.5"/>
        <line x1="242" y1="430" x2="242" y2="450" stroke="#000" stroke-width="1.5"/>
        <line x1="242" y1="440" x2="258" y2="440" stroke="#000" stroke-width="1.5"/>
        <!-- capacitor braille label -->
        <text x="224" y="466" font-size="9" fill="#000" font-family="serif">⠉⠁⠏</text>
      </svg>
    </div>
  </div>

  <div class="print-note">Optimised for swell-paper or tactile embossing printers. Print at 100% scale on A4.</div>
  <button class="dl-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download Tactile SVG
  </button>
</div>

<script>
let level = 2; // 0=50% 1=75% 2=100% 3=125% 4=150% 5=200%
const levels = [50, 75, 100, 125, 150, 200];
function applyZoom() {
  const pct = levels[level];
  document.getElementById('zoomLabel').textContent = pct + '%';
  document.getElementById('svgInner').style.transform = 'scale(' + pct/100 + ')';
  document.getElementById('svgInner').style.transformOrigin = 'top left';
  // expand the container width so scroll works
  document.getElementById('svgInner').style.width = (340 * pct / 100) + 'px';
}
function zoom(dir) {
  level = Math.max(0, Math.min(levels.length - 1, level + dir));
  applyZoom();
}
function resetZoom() {
  level = 2;
  applyZoom();
}
applyZoom();
</script>
